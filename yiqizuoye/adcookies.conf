### 修改说明：
* **解耦存储**：不再将 Cookie 硬编码在脚本中，而是使用 `$prefs.valueForKey` 动态读取。
* **异常提醒**：在 `fetchHomework` 函数中，如果检测到返回数据异常（通常是 Cookie 失效），会通过 `$notify` 主动提醒用户“重新登录获取”。
* **维护性**：如果增加学生，只需在 `yiqizuoye_task.js` 的 `CONFIG.studentNames` 数组中添加名称，并在 `yiqizuoye_get_cookie.js` 中补充对应的 UID 映射即可。
